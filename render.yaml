services:
  - type: web_service
    name: travel-world-backend
    env: php
    phpVersion: 8.4
    region: oregon
    plan: free
    branch: main
    root: server
    buildCommand: composer install --no-interaction --prefer-dist --optimize-autoloader
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: 'false'
      - key: APP_URL
        value: 'https://<YOUR-RENDER-APP>.onrender.com'
      - key: FRONTEND_URL
        value: 'https://<YOUR-VERCEL-APP>.vercel.app'
      - key: FRONTEND_URLS
        value: 'https://<YOUR-VERCEL-APP>.vercel.app'
